function noise3(x,y,z){return noise2(x+z*31.7,y+z*17.3);}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Render size (square, centered)
function getSize() {
  const s = Math.min(W, H) * 0.92;
  return { s, ox: (W - s) / 2, oy: (H - s) / 2 };
}

// Cell data
const cellW = () => getSize().s / GRID;
const cells = [];

// Seeded random
let seed = 42;
function srand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

for (let row = 0; row < GRID; row++) {
  for (let col = 0; col < GRID; col++) {
    const idx = row * GRID + col;
    const edge = EDGES[idx];
    const cr = COLORS[idx * 3], cg = COLORS[idx * 3 + 1], cb = COLORS[idx * 3 + 2];
    const isMask = MASK[idx] === 1;
    const isCapArea = cr > 140 && row < GRID * 0.38 && isMask;
    const isFloatArea = row > GRID * 0.52 && isMask;
    
    // Abstract: scattered positions with large offset
    const noX = noise2(col * 0.12, row * 0.12) * 0.35;
    const noY = noise2(col * 0.12 + 99, row * 0.12 + 99) * 0.35;
    
    // Shape type
    const t = srand();
    const type = t < 0.35 ? 0 : t < 0.65 ? 1 : 2; // rect, line, triangle
    
    // Rotation from noise field (smooth)
    const absRot = noise2(col * 0.08, row * 0.08) * Math.PI * 2;
    
    // Revealed rotation: perpendicular to edge gradient
    let revRot = absRot;
    if (edge > 30 && col > 0 && col < GRID-1 && row > 0 && row < GRID-1) {
      const dx = EDGES[row * GRID + col + 1] - EDGES[row * GRID + col - 1];
      const dy = EDGES[(row+1) * GRID + col] - EDGES[(row-1) * GRID + col];
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        revRot = Math.atan2(dy, dx) + Math.PI / 2;
      }
    }
    
    cells.push({
      col, row, edge, cr, cg, cb, isMask, isCapArea, isFloatArea,
      noX, noY, type, absRot, revRot
    });
  }
}

// State
let revealProgress = 0;
// URL param: ?revealed=1 starts fully revealed (for thumbnail capture)
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('revealed') === '1' || urlParams.get('export') === '1') {
  revealProgress = 1.0;
  state = 'snapping'; // prevent drift from resetting
}
const autoExport = urlParams.get('export') === '1';
let exportDone = false;
let frameCount = 0;
let state = 'drifting'; // drifting | snapping | scattered | scattering
let tweenFrom = 0, tweenTo = 0, tweenDur = 0, tweenElapsed = 0;
let flashAlpha = 0;
let hasFlashed = false;
let startTime = performance.now();

canvas.addEventListener('click', () => {
  if (state === 'drifting' || state === 'scattered') {
    // Snap to reveal
    state = 'snapping';
    tweenFrom = revealProgress;
    tweenTo = 1.0;
    tweenDur = 0.6;
    tweenElapsed = 0;
  } else if (state === 'snapping' && revealProgress >= 0.98) {
    // Scatter back
    state = 'scattering';
    tweenFrom = revealProgress;
    tweenTo = 0.0;
    tweenDur = 1.0;
    tweenElapsed = 0;
    hasFlashed = false;
  }
});

// HSL to RGB helper
function hsl2rgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else { r=c; g=0; b=x; }
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

// Easing
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutBack(t) { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function lerp(a, b, t) { return a + (b - a) * t; }

let lastFrame = performance.now();

function render(now) {
  const dt = Math.min((now - lastFrame) / 1000, 0.05);
  lastFrame = now;
  const time = (now - startTime) / 1000;
  
  // Update state
  if (state === 'drifting') {
    revealProgress = Math.min(1.0, revealProgress + dt / 60); // 60 seconds
  } else if (state === 'snapping') {
    tweenElapsed += dt;
    const t = Math.min(1, tweenElapsed / tweenDur);
    revealProgress = lerp(tweenFrom, tweenTo, easeOutCubic(t));
    if (t >= 1) { revealProgress = 1.0; state = 'snapping'; } // stay, wait for second click
  } else if (state === 'scattering') {
    tweenElapsed += dt;
    const t = Math.min(1, tweenElapsed / tweenDur);
    revealProgress = lerp(tweenFrom, tweenTo, easeOutBack(t));
    if (t >= 1) { revealProgress = 0; state = 'drifting'; hasFlashed = false; }
  }
  
  // Reveal flash
  if (revealProgress > 0.95 && !hasFlashed) {

  }

      ox + s * 0.48, oy + s * 0.45, s * 0.05,

    const driftY = noise3(c.col * 0.06 + 50, c.row * 0.06 + 50, time * 0.2) * 8 * (1 - rp);
    
    const x = lerp(absX + driftX, gridX, rp2);
    const y = lerp(absY + driftY, gridY, rp2);
    
    // Size
    const absSize = cw * 0.38;
    let revSize;
    if (c.edge > 100) revSize = cw * 1.05;
    else if (c.edge > 50) revSize = cw * 0.85;
    else if (c.edge > 20) revSize = cw * 0.6;
    else if (c.isMask) revSize = cw * 0.4;
    else revSize = 0; // Background: invisible in revealed
    
    const sz = lerp(absSize, revSize, rp2);
    if (sz < 0.5) continue;
    
    // Opacity
    const absOpacity = 0.22;
    let revOpacity;
    if (c.edge > 100) revOpacity = 1.0;
    else if (c.edge > 50) revOpacity = 0.9;
    else if (c.edge > 20) revOpacity = 0.6;
    else if (c.isMask) revOpacity = 0.4;
    else revOpacity = 0;
    
    // Pulse (breathing) — phase offset by position
    const pulse = rp > 0.3 ? 0.93 + 0.07 * Math.sin(time * 1.8 + c.col * 0.15 + c.row * 0.12) : 1;
    
    let opacity = lerp(absOpacity, revOpacity, rp2) * pulse;
    if (opacity < 0.01) continue;
    
    // Color
    let r = 0, g = 255, b = 136; // Bankr green base
    
    if (rp > 0.1) {
      const colorInfluence = rp * 0.2;
      
      if (c.isCapArea) {
        // Warm ember: blend toward (220, 100, 60)
        const capBlend = rp * 0.45;
        r = Math.round(lerp(0, 220, capBlend));
        g = Math.round(lerp(255, 100, capBlend * 0.6));
        b = Math.round(lerp(136, 60, capBlend * 0.4));
      } else if (c.isFloatArea) {
        // Rainbow shimmer
        const hue = (c.col / GRID * 360 + time * 25) % 360;
        const [sr, sg, sb] = hsl2rgb(hue, 0.8, 0.55);
        const shimmer = rp * 0.25;
        r = Math.round(lerp(0, sr, shimmer));
        g = Math.round(lerp(255, sg, shimmer));
        b = Math.round(lerp(136, sb, shimmer));
      } else {
        // Standard: subtle pfp color blend
        r = Math.round(c.cr * colorInfluence);
        g = Math.round(lerp(255, c.cg, colorInfluence * 0.3));
        b = Math.round(lerp(136, c.cb, colorInfluence * 0.3));
      }
    }
    
    // Rotation
    let rotDiff = c.revRot - c.absRot;
    while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
    while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
    const rot = c.absRot + rotDiff * rp;
    
    // GLOW (behind element, for high edge cells in revealed state)
    if (c.edge > 60 && rp > 0.2) {
      const glowAlpha = opacity * rp * 0.16;
      const glowR = sz * 3.2;
      const grd = ctx.createRadialGradient(x, y, 0, x, y, glowR);
      
      if (c.isCapArea) {
        grd.addColorStop(0, `rgba(220, 120, 60, ${glowAlpha})`);
      } else if (c.isFloatArea) {
        const hue = (c.col / GRID * 360 + time * 25) % 360;
        const [gr, gg, gb] = hsl2rgb(hue, 0.6, 0.5);
        grd.addColorStop(0, `rgba(${gr}, ${gg}, ${gb}, ${glowAlpha * 0.7})`);
      } else {
        grd.addColorStop(0, `rgba(0, 255, 136, ${glowAlpha})`);
      }
      grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x, y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Draw element
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = opacity;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    
    const hs = sz / 2;
    
    if (c.type === 0) {
      // Rectangle
      ctx.fillRect(-hs, -hs, sz, sz);
    } else if (c.type === 1) {
      // Line
      ctx.lineWidth = Math.max(1, sz * 0.12);
      ctx.beginPath();
      ctx.moveTo(-hs, 0);
      ctx.lineTo(hs, 0);
      ctx.stroke();
    } else {
      // Triangle
      ctx.beginPath();
      ctx.moveTo(0, -hs);
      ctx.lineTo(-hs, hs);
      ctx.lineTo(hs, hs);
      ctx.closePath();
      ctx.fill();
    }
    
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  
  // Reveal flash overlay
  if (flashAlpha > 0.001) {
    ctx.fillStyle = `rgba(0, 255, 136, ${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
  
  // Auto-export: after 3 frames (ensure full render), download PNG
  if (autoExport && !exportDone && frameCount > 3) {
    exportDone = true;
    canvas.toBlob(function(b) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'builder-thumbnail.png';
      a.click();
      document.title = 'EXPORTED';
    }, 'image/png');
  }
  frameCount++;
  
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body></html>
